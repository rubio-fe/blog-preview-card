<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="icon" href="./images/favicon-32x32.png" type="image/x-icon" />
    <!-- ===== Google Fonts! ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <!-- ===== Styles! ===== -->
    <link rel="stylesheet" href="./css/main.css" />
    <title>Blog Preview Card</title>
  </head>
  <body>
    <!-- ===== Main Body! ===== -->
    <main>
      <section class="preview-card">
        <img
          src="./images/illustration-article.svg"
          alt="HTML and CSS Illustration"
          class="illustration-img"
        />
        <span class="tag">Learning</span>
        <p class="publication-date">Published 21 Dec 2023</p>
        <h1><a href="#">HTML & CSS foundations</a></h1>
        <p>
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
        <div class="publisher-container">
          <img
            src="./images/image-avatar.webp"
            alt="Greg Hooper Profile Picture"
            class="avatar-img"
          />
          <span class="publisher-name">Greg Hooper</span>
        </div>
      </section>
    </main>
    <!-- ===== Footer! ===== -->
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io">Frontend Mentor</a>. Coded by
      <a href="https://github.com/rubio-fe">Rubio</a>.
    </footer>
  </body>
</html>
